<html>
    <head>
        <title>Chat</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
    #chat{
        width:100%;
        height:400px;
    }
    h3{
        color:#F2C2EC;
    }
    #send{
        background: linear-gradient(to right,#F2C2EC,#B5C1EE);
        width:1090px;
        border-color:#F2C2EC;
        padding:5px;
    }
    .user-message{
        text-align:center;
        background:#F2C2EC;
        width:100px;
        border-radius:20px;
        margin-left:auto;
        align-items:right;
        margin-right:20px;
        position:relative;
    }
    .bot-message{
        background:#B5C1EE;
        width:200px;
        border-radius:20px;
        padding:5px;
    }
</style>
    </head>
    <body class="bg-light">
        <div class="container">
            <h3 class="text-center">Smart Allocation Bot</h3>
            <div class="card p-3">
                <div id="chat"></div>
            </div>
            <input type="text" id="text" placeholder="Ask Question..." class="form-control mt-4">
            <button onclick="send()" class="mt-4" id="send">Send</button>
            <a href="dashboard.html" class="btn btn-dark btn-sm mt-3">Back</a>
        </div>
      <script>
        async function send() {
            let text = document.getElementById("text").value;
            let response = await fetch(`http://localhost:8080/send?text=${text}`);
            let data = await response.text();
            document.getElementById("chat").innerHTML +=
            "<p class='user-message'><b>You:</b>" + text + "</p>";
             document.getElementById("chat").innerHTML +=
            "<p class='bot-message'><b>Bot:</b>" + data + "</p>";
            document.getElementById("text").value = "";

            
        }
      </script>

    </body>
</html>
