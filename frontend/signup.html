<html>
    <head>
        <title>Signup</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
    body{
       background: linear-gradient(to right,#F2C2EC,#B5C1EE);
    }
    .card{
        width:400px;
        margin-left:350px;
        margin-top:80px;
    }
   
    
</style>
    </head>
    <body>
        <div class="container">
            <div class="card p-4 text-center">
                <h3>Create Account</h3>
                 <input type="text" id="name" placeholder="Enter Name" class="form-control mt-4">
                <input type="email" id="mail" placeholder="Enter Mail" class="form-control mt-4">
                 <input type="password" id="password" placeholder="Enter Password" class="form-control mt-4">
                 <button onclick="signup()" class="btn btn-success mt-4">Register</button>
                 <p class="mt-3">Already have account?<span class="text-primary" onclick="back()">Login</span></p>
                 <p class="text-danger mt-3" id="result"></p>

            </div>
        </div>
        <script>
            async function signup() {
                  let name = document.getElementById("name").value;
            let mail = document.getElementById("mail").value;
            let password = document.getElementById("password").value;
        let response = await fetch(`http://localhost:8080/signup?name=${name}&mail=${mail}&password=${password}`,
            {
                method:"POST"
            }
        );
        let data = await response.text();
        document.getElementById("result").innerHTML = data;
       
                
            }
            function back(){
                window.location.href = "index.html";
            }
        </script>
    </body>
</html>
