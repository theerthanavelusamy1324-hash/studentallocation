<html>
    <head>
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
    body{
      background: linear-gradient(to right,#F2C2EC,#B5C1EE);
    }
    .card{
        width:400px;
        margin-left:350px;
        margin-top:80px;
    }
   
    .btn{
          background: linear-gradient(135deg, #667eea, #764ba2);
          color:white;

    }
</style>
    </head>
    <body>
        <div class="container">
            <div class="card p-4 text-center">
                <h3>Student Allocation Portal</h3>
                <input type="email" id="mail" placeholder="Enter Mail" class="form-control mt-4">
                 <input type="password" id="password" placeholder="Enter Password" class="form-control mt-4">
                 <button onclick="login()" class="btn mt-4">Login</button>
                 <p class="mt-3">New User? <span class="text-primary" onclick="create()">Create Account</span></p>

            </div>
        </div>
        <script>
            async function login() {
            let mail = document.getElementById("mail").value;
            let password = document.getElementById("password").value;
        let response = await fetch(`http://localhost:8080/login?mail=${mail}&password=${password}`,
            {
                method:"POST"
            }
        );
        let data = await response.text();
        if(data == "success"){
            window.location.href = "dashboard.html";
        }
        else{
            alert("Invalid password");
        }
                
            }
            function create(){
                window.location.href = "signup.html";
            }
        </script>
    </body>
</html>
