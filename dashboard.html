<html>
    <head>
        <title>Dashboard</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    
    .sidebar{
        width:200px;
        height:100vh;
        background:#CDB5D9;
    }
    a{
        text-decoration:none;
        color:black;
    }
.btn:hover{
        background:white;
    }
    .card{
        border:none;
    }
   
</style>
    </head>
    <body class="bg-light">
        <div class="row">
            <div class="col-md-2">
                <div class="sidebar p-4">
                    <h5 class="text-center">Dashboard</h5>
                    <ul>
                    <a href="student.html" class="btn mt-3">Registration </a>
                      <a href="course.html" class="btn mt-3">Course </a>
                        <a href="allocation.html" class="btn mt-3">Allocation </a>
                          <a href="chat.html" class="btn mt-3">Chat</a>
                          </ul>
                </div>
            </div>
            <div class="col-md-10">
                <h3 class="mt-3">Student Dashboard</h3>
                <div class="row mt-3">
                    <div class="col-md-3">
                        <div class="card p-3 text-center shadow">
                            <h5>Total Students</h5>
                            <p class="text-primary" id="totalstudents">0</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center shadow">
                            <h5>Total Courses</h5>
                            <p class="text-success">10</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center shadow">
                            <h5>Allocated Students</h5>
                            <p class="text-warning" id="allocatedstudents">0</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card p-3 text-center shadow">
                            <h5>Available seats</h5>
                            <p class="text-danger">365</p>
                        </div>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-4">
                        <div class="card p-3">
                            <h5>📊 Course-wise allocation</h5>
                            <canvas id="barchart"></canvas>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3">
                            <h5>📈 Category Distribution</h5>
                            <canvas id="linechart"></canvas>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-3">
                            <h5>🎯 Allocation overview</h5>
                            <canvas id="piechart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            async function studentcount() {
            let response = await fetch(`http://localhost:8080/studentcount`);
            let data = await response.json();
            document.getElementById("totalstudents").innerHTML = data;
                
            }
            studentcount();
            async function allocatecount() {
                let response = await fetch(`http://localhost:8080/allocatecount`);
                let data = await response.json();
                document.getElementById("allocatedstudents").innerHTML = data;
                
            }
            allocatecount();
           
           async function loadchart() {
            fetch("http://localhost:8080/studentdetails")
            .then(res => res.json())
            .then(data =>{
                let count = {};
                data.forEach(student =>{
                    let course = student.type;
                    count[course] = (count[course] || 0) + 1;
                });
                const labels = Object.keys(count);
                const values = Object.values(count);
                new Chart(document.getElementById("barchart"),{
                    type:'bar',
                    data:{
                        labels:labels,
                        datasets:[{
                            label:'Course Wise count',
                            data:values
                        }]
                    }
                });
            })
            
           }
           loadchart();
            let name = [];
            let General = 0;
            let OBC = 0;
            let SC = 0;
            let ST = 0;
            let linechart;
            async function loadcategory() {
                  let response = await fetch(`http://localhost:8080/studentdetails`);
                let data = await response.json();
                console.log(data);
                for(let m of data){
                    name.push(m.category);
                    if(m.category === "General"){
                        General++;
                    }
                     if(m.category === "OBC"){
                        OBC++;
                    }
                     if(m.category === "SC"){
                        SC++;
                    }
                     if(m.category === "ST"){
                        ST++;
                    }
                    if(linechart){
                        linechart.destroy();
                    }
                    linechart = new Chart(document.getElementById("linechart"),{
                        type:'line',
                        data:{
                            labels:name,
                            datasets:[{
                                label:'Category',
                                data:[General,OBC,SC,ST],
                                borderColor:'red',
                                fill:false
                            }]
                        }
                    });
                }
                
            }
            loadcategory();
            async function loadoverview() {
                let totalresponse = await fetch(`http://localhost:8080/studentcount`);
                let totaldata = await totalresponse.json();
                let allocate = await fetch(`http://localhost:8080/allocatecount`);
                let totalallocate = await allocate.json();
                let notallocate = await fetch(`http://localhost:8080/notallocatecount`);
                let notallocatedata = await notallocate.json();
                new Chart(document.getElementById("piechart"),{
                    type:'pie',
                    data:{
                        labels:['TotalStudents','Allocate Students','Not Allocate'],
                        datasets:[{
                            label:'Allocate overview',
                            data:[totaldata,totalallocate,notallocatedata],
                            backgroundColor:["#FFC8DD","#CDB5D9","#BDE0FE"]
                        }]
                    }
                });
                
            }
            loadoverview();

        </script>
    </body>
</html>
